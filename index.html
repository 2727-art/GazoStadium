<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090b12" />
    <meta
      name="description"
      content="好きな画像を用意し、通常型・戦略型1on1、2on2、4人バトルロワイヤルで知らない相手と採点し合うオンライン画像対戦ゲーム。"
    />
    <title>貼り合いスタジアム | Online Image Battle</title>
    <link rel="stylesheet" href="styles.css?v=stamps-v1" />
    <link rel="stylesheet" href="strategy.css?v=strategy-audio-v1" />
  </head>
  <body>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="#" id="homeLink" aria-label="貼り合いスタジアム ホーム">
        <span class="brand-mark" aria-hidden="true"><i></i><i></i></span>
        <span>
          <strong>貼り合いスタジアム</strong>
          <small>HARIAI STADIUM</small>
        </span>
      </a>
      <div class="header-badges" aria-label="現在のモード">
        <span class="status-dot"><i></i> READY</span>
        <span class="privacy-badge">画像保存なし</span>
        <button class="audio-toggle" id="audioToggle" type="button" aria-pressed="true" aria-label="効果音をオフにする">SE ON</button>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>

    <footer class="site-footer">
      <span>ONLINE 1ON1 + STRATEGY + 2ON2 + BATTLE ROYALE / FIREBASE + WEBRTC</span>
      <span>画像と戦略型の添付音声は対戦相手へ直接送信し、サーバーへ保存しません</span>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div id="fxLayer" class="fx-layer" aria-hidden="true"></div>

    <dialog id="destroyDialog" class="confirm-dialog">
      <form method="dialog">
        <span class="eyebrow">NO CONTEST</span>
        <h2>この対戦を破棄しますか？</h2>
        <p>勝敗と連勝数には影響しません。選択した画像とチャットはすべて破棄されます。</p>
        <div class="dialog-actions">
          <button class="button button-ghost" value="cancel">対戦に戻る</button>
          <button class="button button-danger" id="confirmDestroy" value="confirm">ルームを破棄</button>
        </div>
      </form>
    </dialog>

    <dialog id="sampleHandicapDialog" class="confirm-dialog">
      <form method="dialog">
        <span class="eyebrow">SAMPLE HANDICAP</span>
        <h2>サンプル画像のHPハンデ</h2>
        <p id="sampleHandicapMessage">サンプル画像1枚につき、最大HPが5減少します。</p>
        <div class="dialog-actions">
          <button class="button button-ghost" value="cancel">デッキを見直す</button>
          <button class="button button-primary" id="confirmSampleMatch" value="confirm">このデッキで対戦を探す</button>
        </div>
      </form>
    </dialog>

    <noscript>
      <p class="noscript">このゲームを遊ぶにはJavaScriptを有効にしてください。</p>
    </noscript>
    <script src="audio.js" defer></script>
    <script src="app.js?v=player-titles-v1" defer></script>
    <script type="module" src="strategy.js?v=stamps-v1"></script>
    <script type="module" src="online.js?v=stamps-v1"></script>
    <script type="module" src="team.js?v=stamps-v1"></script>
    <script type="module" src="royale.js?v=stamps-v1"></script>
  </body>
</html>
